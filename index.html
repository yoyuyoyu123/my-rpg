<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无界·叙事引擎</title>
<style>
  body { background:#0f0a05; color:#c8a96e; font-family:'Share Tech Mono',monospace; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; flex-direction:column; gap:20px; }
  .logo { font-size:22px; letter-spacing:4px; text-shadow:0 0 15px rgba(200,169,110,0.5); }
  .sub { font-size:11px; color:#7a6a50; letter-spacing:2px; }
  .btns { display:flex; gap:12px; margin-top:10px; }
  .btn { border:1px solid #c8a96e; color:#c8a96e; background:transparent; font-family:'Share Tech Mono',monospace; font-size:12px; padding:10px 24px; cursor:pointer; letter-spacing:2px; text-decoration:none; transition:all 0.2s; }
  .btn:hover { background:#c8a96e; color:#0f0a05; }
  .hint { font-size:10px; color:#7a6a50; letter-spacing:1px; }
</style>
</head>
<body>
<div class="logo">无界·叙事引擎</div>
<div class="sub">▸ 正在检测设备...</div>
<div class="btns">
  <a class="btn" href="pc.html">💻 电脑版</a>
  <a class="btn" href="mobile.html">📱 手机版</a>
</div>
<div class="hint">存档在两个版本之间自动共享</div>
<script>
  var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  document.querySelector('.sub').textContent = isMobile ? '▸ 检测到手机，3秒后跳转...' : '▸ 检测到电脑，3秒后跳转...';
  setTimeout(function() {
    location.href = isMobile ? 'mobile.html' : 'pc.html';
  }, 3000);
</script>
</body>
</html>
